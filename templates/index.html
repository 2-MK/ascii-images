<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to ASCII Converter</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#0f172a;
    color:#f8fafc;
}

.container{
    width:90%;
    max-width:500px;
    background:#1e293b;
    padding:40px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
    text-align:center;
}

h1{
    font-size:2rem;
    margin-bottom:10px;
}

.subtitle{
    color:#94a3b8;
    margin-bottom:30px;
    font-size:0.95rem;
}

.file-input{
    width:100%;
    padding:14px;
    border:2px dashed #334155;
    border-radius:12px;
    background:#0f172a;
    color:#94a3b8;
    cursor:pointer;
    margin-bottom:20px;
}

.file-input:hover{
    border-color:#38bdf8;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:12px;
    background:linear-gradient(
        135deg,
        #38bdf8,
        #6366f1
    );
    color:white;
    font-size:1rem;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(99,102,241,0.35);
}

.footer{
    margin-top:20px;
    font-size:0.8rem;
    color:#64748b;
}
</style>

</head>
<body>

<div class="container">

    <h1>Image → ASCII</h1>

    <p class="subtitle">
        Upload an image and convert it into ASCII art instantly.
    </p>

    <form action="/convert"
          method="POST"
          enctype="multipart/form-data">

        <input
            type="file"
            name="image"
            class="file-input"
            required>

        <button type="submit">
            Convert Image
        </button>

    </form>

    <div class="footer">
        Powered by Flask & Python
    </div>

</div>

</body>
</html>
