<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ASCII Result</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    background:#0f172a;
    color:#f8fafc;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:30px;
}

.container{
    width:95%;
    max-width:1200px;
    background:#1e293b;
    border-radius:20px;
    padding:30px;
    box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

.header{
    text-align:center;
    margin-bottom:25px;
}

.header h1{
    font-size:2rem;
    margin-bottom:8px;
}

.header p{
    color:#94a3b8;
}

.ascii-box{
    background:#020617;
    border:1px solid #334155;
    border-radius:15px;
    padding:20px;
    overflow:auto;
    max-height:70vh;
}

pre{
    font-family: "Courier New", monospace;
    font-size:8px;
    line-height:8px;
    color:#38bdf8;
    white-space:pre;
}

.actions{
    margin-top:25px;
    text-align:center;
}

.btn{
    display:inline-block;
    padding:12px 24px;
    border-radius:12px;
    text-decoration:none;
    font-weight:600;
    background:linear-gradient(
        135deg,
        #38bdf8,
        #6366f1
    );
    color:white;
    transition:0.3s;
}

.btn:hover{
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(99,102,241,0.35);
}

</style>

</head>

<body>

<div class="container">

    <div class="header">
        <h1>ASCII Art Result</h1>
        <p>Your image has been successfully converted.</p>
    </div>

    <div class="ascii-box">
        <pre>{{ ascii_art }}</pre>
    </div>

    <div class="actions">
        <a href="/" class="btn">
            Convert Another Image
        </a>
    </div>

</div>

</body>
</html>
